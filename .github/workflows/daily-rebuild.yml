name: Daily rebuild — live risk dashboard + leveraged-ETF backtests

# Refetches market data for both live-computed projects, rebuilds the site,
# and redeploys. Computation logic for each lives in its own private repo
# (source of truth); this workflow just pulls both in at build time.
# Observable Framework builds the whole site on every `npm run build`, so
# both projects' gitignored data files need to exist or the build fails on
# whichever page is missing its data — hence both are computed here even
# though the workflow name emphasizes the risk dashboard's daily cadence.

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC daily — after US market close
  workflow_dispatch: {}     # allow manual runs from the Actions tab

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout geometry-of-risk (research code, source of truth)
        uses: actions/checkout@v4
        with:
          repository: youness-yach/geometry-of-risk
          path: geometry-of-risk

      - name: Checkout leveraged-etf-strategy (private, source of truth)
        uses: actions/checkout@v4
        with:
          repository: youness-yach/leveraged-etf-strategy
          token: ${{ secrets.BACKTEST_REPO_TOKEN }}
          path: leveraged-etf-strategy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install risk-dashboard dependencies
        run: pip install -r geometry-of-risk/requirements.txt

      - name: Compute today's risk dashboard data
        run: |
          python geometry-of-risk/scripts/compute_risk_dashboard.py \
            src/quantitative-finance/geometry-of-risk/data/risk-dashboard.json

      - name: Install backtest dependencies
        run: pip install -r leveraged-etf-strategy/requirements.txt

      - name: Fetch market data for leveraged-ETF backtests
        working-directory: leveraged-etf-strategy
        run: python scripts/fetch_data.py --start 2018-01-01

      - name: Run all four leveraged-ETF backtests
        working-directory: leveraged-etf-strategy
        run: |
          for cfg in riskbalance conservative alpha1 alpha2; do
            python scripts/run_backtest.py \
              --config "$cfg" \
              --start 2021-01-01 \
              --out "../src/quantitative-finance/leveraged-etf-strategy/data/$cfg.json"
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install site dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler pages deploy dist --project-name=youness-yachruti --commit-dirty=true
