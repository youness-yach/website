name: Run leveraged-ETF backtest on demand

# Triggered by a visitor clicking "Run this backtest" on the site (via a
# Cloudflare Pages Function, which holds the dispatch token — never exposed
# to the browser) or manually from the Actions tab. Re-fetches market data
# through today, re-runs the requested config, rebuilds, and redeploys.
# Computation logic lives in the private leveraged-etf-strategy repo (source
# of truth); this workflow just pulls it in at build time. Only the computed
# metrics.json ends up in this repo — the strategy code and market data stay
# in the private repo.

on:
  workflow_dispatch:
    inputs:
      config:
        description: "Which backtest to run"
        required: true
        type: choice
        options:
          - riskbalance
          - conservative
          - alpha1
          - alpha2

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout leveraged-etf-strategy (private, source of truth)
        uses: actions/checkout@v4
        with:
          repository: youness-yach/leveraged-etf-strategy
          token: ${{ secrets.BACKTEST_REPO_TOKEN }}
          path: leveraged-etf-strategy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backtest dependencies
        run: pip install -r leveraged-etf-strategy/requirements.txt

      - name: Fetch market data
        working-directory: leveraged-etf-strategy
        run: python scripts/fetch_data.py --start 2018-01-01

      - name: Run backtest
        working-directory: leveraged-etf-strategy
        run: |
          python scripts/run_backtest.py \
            --config ${{ github.event.inputs.config }} \
            --start 2021-01-01 \
            --out ../src/quantitative-finance/leveraged-etf-strategy/data/${{ github.event.inputs.config }}.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install site dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler pages deploy dist --project-name=youness-yachruti --commit-dirty=true
